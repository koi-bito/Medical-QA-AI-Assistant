name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install fastapi httpx pytest pydantic uvicorn numpy sqlalchemy pymysql passlib bcrypt python-jose python-multipart python-dotenv slowapi

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
          SECRET_KEY: "test-secret-key-for-ci-only"
          USE_GROQ: "true"
        run: pytest tests/ -v
